<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0f0a06">
<title>Admin · Brunch Ébène &amp; Saveurs</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, system-ui, sans-serif;
    background: #0f0a06;
    color: #f5ede1;
    min-height: 100vh;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  /* Login */
  .login-screen {
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
  }
  .login-card {
    background: #1a1108;
    border: 1px solid #3a2818;
    border-radius: 20px;
    padding: 32px 24px;
    width: 100%;
    max-width: 380px;
    text-align: center;
  }
  .lock-icon {
    width: 60px; height: 60px;
    background: linear-gradient(135deg, #f97316, #fbbf24);
    border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 18px;
    color: white;
  }
  .login-card h1 { margin: 0 0 8px; font-size: 22px; font-weight: 800; color: #fff; }
  .login-card p { color: #d4a574; font-size: 14px; margin: 0 0 24px; }
  .login-card input {
    width: 100%;
    background: #0f0a06;
    border: 1.5px solid #3a2818;
    color: #f5ede1;
    border-radius: 12px;
    padding: 14px;
    font-size: 16px;
    font-family: inherit;
    text-align: center;
    letter-spacing: 4px;
    margin-bottom: 12px;
  }
  .login-card input:focus { outline: none; border-color: #f97316; }
  .login-card button {
    width: 100%;
    background: linear-gradient(135deg, #f97316, #ea580c);
    color: white;
    border: none;
    border-radius: 12px;
    padding: 14px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
  }
  .login-hint { font-size: 12px; color: #8a6648; margin-top: 14px; }
  .login-hint code { background: #3a2818; padding: 2px 8px; border-radius: 6px; color: #fbbf24; }
  .login-error { color: #f87171; font-size: 13px; margin-top: 8px; min-height: 16px; }

  /* Dashboard */
  .dashboard { display: none; max-width: 1200px; margin: 0 auto; padding: 20px; }
  .dashboard.show { display: block; }

  .header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 20px;
    flex-wrap: wrap;
    gap: 12px;
  }
  .header h1 {
    margin: 0;
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.4px;
    color: #fff;
  }
  .header h1 .accent {
    background: linear-gradient(135deg, #f97316, #fbbf24);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    font-style: italic;
  }
  .header-actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .btn {
    padding: 10px 14px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    border: none;
    display: inline-flex; align-items: center; gap: 6px;
    text-decoration: none;
  }
  .btn-primary {
    background: linear-gradient(135deg, #f97316, #ea580c);
    color: white;
  }
  .btn-secondary {
    background: #1a1108;
    color: #f5ede1;
    border: 1px solid #3a2818;
  }
  .btn-danger {
    background: transparent;
    color: #f87171;
    border: 1px solid #3a2818;
  }
  .btn-success {
    background: rgba(22, 163, 74, 0.15);
    color: #22c55e;
    border: 1px solid rgba(22, 163, 74, 0.3);
  }

  /* Mode indicator */
  .mode-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(251, 191, 36, 0.1);
    color: #fbbf24;
    border: 1px solid rgba(251, 191, 36, 0.2);
    padding: 4px 10px;
    border-radius: 99px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-left: 10px;
  }
  .mode-pill.live {
    background: rgba(22, 163, 74, 0.1);
    color: #22c55e;
    border-color: rgba(22, 163, 74, 0.3);
  }
  .mode-pill .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
  .mode-pill.live .dot { animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:.3;} }

  /* Stats */
  .stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
    margin-bottom: 20px;
  }
  .stat {
    background: #1a1108;
    border: 1px solid #3a2818;
    border-radius: 16px;
    padding: 16px;
  }
  .stat-label { font-size: 12px; color: #d4a574; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
  .stat-value { font-size: 26px; font-weight: 800; margin-top: 6px; letter-spacing: -0.5px; color: #fff; }
  .stat-sub { font-size: 12px; color: #22c55e; margin-top: 2px; font-weight: 600; }
  .stat.accent .stat-value { color: #fbbf24; }
  .stat.danger .stat-sub { color: #fb923c; }

  /* Filters */
  .filters {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }
  .filters input, .filters select {
    background: #1a1108;
    border: 1px solid #3a2818;
    color: #f5ede1;
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 14px;
    font-family: inherit;
  }
  .filters input { flex: 1; min-width: 200px; }
  .filters input:focus, .filters select:focus { outline: none; border-color: #f97316; }

  /* Table */
  .table-wrap {
    background: #1a1108;
    border: 1px solid #3a2818;
    border-radius: 16px;
    overflow: hidden;
  }
  .table-scroll { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; min-width: 800px; }
  th, td {
    padding: 12px 14px;
    text-align: left;
    font-size: 14px;
    border-bottom: 1px solid #3a2818;
  }
  th {
    background: #14100a;
    font-size: 12px;
    color: #d4a574;
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 700;
    position: sticky;
    top: 0;
  }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #14100a; }
  td { color: #f5ede1; }
  .badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 99px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    cursor: pointer;
  }
  .badge-paid { background: rgba(22, 163, 74, 0.15); color: #22c55e; }
  .badge-pending { background: rgba(251, 191, 36, 0.15); color: #fbbf24; }

  .empty {
    padding: 60px 20px;
    text-align: center;
    color: #d4a574;
  }
  .empty svg { color: #5a4028; margin-bottom: 12px; }
  .empty h3 { margin: 0 0 6px; color: #fff; }

  .method-pill {
    display: inline-block;
    padding: 3px 8px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 700;
    background: #3a2818;
    color: #fbbf24;
    text-transform: capitalize;
  }

  @media (max-width: 600px) {
    .header h1 { font-size: 18px; }
    .stat-value { font-size: 22px; }
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="login">
  <div class="login-card">
    <div class="lock-icon">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    </div>
    <h1>Espace organisateur</h1>
    <p>Brunch Ébène &amp; Saveurs · 22 août 2026</p>
    <input type="password" id="pwd" placeholder="••••••" autocomplete="off">
    <button id="loginBtn">Se connecter</button>
    <div class="login-error" id="loginError"></div>
    <div class="login-hint">💡 Code démo : <code>ebene2026</code></div>
  </div>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">
  <div class="header">
    <h1>🌴 Brunch <span class="accent">Ébène &amp; Saveurs</span> <span class="mode-pill" id="modePill"><span class="dot"></span><span id="modeText">DÉMO</span></span></h1>
    <div class="header-actions">
      <button class="btn btn-secondary" id="refreshBtn">↻ Actualiser</button>
      <button class="btn btn-secondary" id="addDemo">+ Démo</button>
      <button class="btn btn-primary" id="exportBtn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Export Excel
      </button>
      <button class="btn btn-danger" id="logoutBtn">Déconnexion</button>
    </div>
  </div>

  <div class="stats" id="stats"></div>

  <div class="filters">
    <input type="text" id="search" placeholder="🔍 Nom, email, n° résa...">
    <select id="filterMethod">
      <option value="">Tous les paiements</option>
      <option value="revolut">Revolut</option>
      <option value="wero">Wero</option>
      <option value="cb">CB</option>
      <option value="virement">Virement</option>
    </select>
    <select id="filterStatus">
      <option value="">Tous statuts</option>
      <option value="confirmé">✓ Payé</option>
      <option value="en attente vérification">⏳ En attente</option>
    </select>
    <select id="filterTicket">
      <option value="">Toutes formules</option>
      <option value="standard">Standard</option>
      <option value="duo">Duo</option>
      <option value="trio">Trio</option>
      <option value="groupe">Groupe</option>
    </select>
  </div>

  <div class="table-wrap">
    <div class="table-scroll">
      <table id="resTable">
        <thead>
          <tr>
            <th>N° Résa</th>
            <th>Date</th>
            <th>Nom</th>
            <th>Email</th>
            <th>Téléphone</th>
            <th>Formule</th>
            <th>Places</th>
            <th>Total</th>
            <th>Paiement</th>
            <th>Statut</th>
          </tr>
        </thead>
        <tbody id="resBody"></tbody>
      </table>
    </div>
    <div class="empty" id="empty" style="display:none;">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      <h3>Aucune réservation pour le moment</h3>
      <p>Les nouvelles réservations s'afficheront ici en temps réel.</p>
    </div>
  </div>
</div>

<script>
  // 🔧 CONFIG
  const API_URL = 'https://brunch-eb-ne-saveurs.onrender.com/api';
  const ADMIN_PWD = 'BrunchEbene2026!'; // ⚠️ DOIT correspondre à ADMIN_TOKEN sur Render !
  const CAPACITY = 200;

  // --- Auth ---
  document.getElementById('loginBtn').addEventListener('click', tryLogin);
  document.getElementById('pwd').addEventListener('keydown', e => { if (e.key === 'Enter') tryLogin(); });

  function tryLogin() {
    const v = document.getElementById('pwd').value;
    if (v === ADMIN_PWD) {
      sessionStorage.setItem('admin_ok', '1');
      showDashboard();
    } else {
      document.getElementById('loginError').textContent = '❌ Code incorrect';
    }
  }

  if (sessionStorage.getItem('admin_ok')) showDashboard();

  function showDashboard() {
    document.getElementById('login').style.display = 'none';
    document.getElementById('dashboard').classList.add('show');
    // Set mode pill
    const pill = document.getElementById('modePill');
    const text = document.getElementById('modeText');
    if (API_URL) {
      pill.classList.add('live');
      text.textContent = 'LIVE';
    } else {
      text.textContent = 'DÉMO (localStorage)';
    }
    render();
    // Auto-refresh toutes les 30s en mode LIVE
    if (API_URL) setInterval(render, 30000);
  }

  document.getElementById('logoutBtn').addEventListener('click', () => {
    sessionStorage.removeItem('admin_ok');
    location.reload();
  });

  // --- Data ---
  async function getReservations() {
    if (API_URL) {
      try {
        const r = await fetch(API_URL + '/reservations', { headers: { 'X-Admin-Token': ADMIN_PWD } });
        if (r.ok) return await r.json();
      } catch(e) { console.warn('API offline, fallback localStorage', e); }
    }
    return JSON.parse(localStorage.getItem('reservations') || '[]');
  }

  async function render() {
    const all = await getReservations();
    renderStats(all);
    renderTable(all);
  }

  function renderStats(data) {
    const total = data.length;
    const totalRevenue = data.reduce((s, r) => s + (r.total || 0), 0);
    const totalPlaces = data.reduce((s, r) => s + (r.qty || 0), 0);
    const today = new Date().toISOString().slice(0,10);
    const todayCount = data.filter(r => (r.timestamp || '').slice(0,10) === today).length;
    const pending = data.filter(r => r.status !== 'confirmé').length;
    const fillPct = Math.round(totalPlaces/CAPACITY*100);

    document.getElementById('stats').innerHTML = `
      <div class="stat">
        <div class="stat-label">Réservations</div>
        <div class="stat-value">${total}</div>
        <div class="stat-sub">+${todayCount} aujourd'hui</div>
      </div>
      <div class="stat accent">
        <div class="stat-label">Places vendues</div>
        <div class="stat-value">${totalPlaces}<span style="font-size:14px; color:#8a6648;"> / ${CAPACITY}</span></div>
        <div class="stat-sub">${Math.max(0, CAPACITY - totalPlaces)} restantes</div>
      </div>
      <div class="stat accent">
        <div class="stat-label">Recettes</div>
        <div class="stat-value">${totalRevenue.toFixed(0)} €</div>
        <div class="stat-sub">Objectif : 7 000 €</div>
      </div>
      <div class="stat ${pending > 5 ? 'danger' : ''}">
        <div class="stat-label">En attente paiement</div>
        <div class="stat-value">${pending}</div>
        <div class="stat-sub">${fillPct}% de remplissage</div>
      </div>
    `;
  }

  function renderTable(all) {
    const q = (document.getElementById('search').value || '').toLowerCase();
    const m = document.getElementById('filterMethod').value;
    const s = document.getElementById('filterStatus').value;
    const t = document.getElementById('filterTicket').value;

    const filtered = all.filter(r => {
      if (m && r.paymentMethod !== m) return false;
      if (s && r.status !== s) return false;
      if (t && r.ticketId !== t) return false;
      if (q) {
        const blob = `${r.prenom} ${r.nom} ${r.email} ${r.bookingId} ${r.telephone}`.toLowerCase();
        if (!blob.includes(q)) return false;
      }
      return true;
    });

    const body = document.getElementById('resBody');
    const empty = document.getElementById('empty');

    if (!filtered.length) {
      body.innerHTML = '';
      empty.style.display = all.length ? 'none' : 'block';
      if (all.length && !filtered.length) {
        body.innerHTML = `<tr><td colspan="10" style="text-align:center; color:#8a6648; padding: 30px;">Aucun résultat pour ces filtres</td></tr>`;
      }
      return;
    }
    empty.style.display = 'none';

    body.innerHTML = filtered.map(r => {
      const d = new Date(r.timestamp);
      const dateStr = d.toLocaleDateString('fr-FR') + ' ' + d.toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'});
      const isPaid = r.status === 'confirmé';
      return `
        <tr>
          <td><code style="font-size:12px; color:#fbbf24;">${r.bookingId}</code></td>
          <td>${dateStr}</td>
          <td><strong>${r.prenom} ${r.nom}</strong></td>
          <td><a href="mailto:${r.email}" style="color:#d4a574; text-decoration:none;">${r.email}</a></td>
          <td><a href="tel:${r.telephone}" style="color:#d4a574; text-decoration:none;">${r.telephone}</a></td>
          <td>${r.ticketName}</td>
          <td><strong>${r.qty}</strong></td>
          <td><strong style="color:#fbbf24;">${r.total.toFixed(2).replace('.', ',')} €</strong></td>
          <td><span class="method-pill">${r.paymentMethod || '—'}</span></td>
          <td><span class="badge ${isPaid ? 'badge-paid' : 'badge-pending'}" data-id="${r.bookingId}">${isPaid ? '✓ Payé' : '⏳ En attente'}</span></td>
        </tr>
      `;
    }).join('');

    // Click status to toggle paid/pending (en local pour la démo)
    document.querySelectorAll('.badge[data-id]').forEach(b => {
      b.addEventListener('click', async () => {
        const id = b.dataset.id;
        const local = JSON.parse(localStorage.getItem('reservations') || '[]');
        const r = local.find(x => x.bookingId === id);
        if (r) {
          r.status = r.status === 'confirmé' ? 'en attente vérification' : 'confirmé';
          localStorage.setItem('reservations', JSON.stringify(local));
          render();
        }
      });
    });
  }

  document.getElementById('search').addEventListener('input', render);
  document.getElementById('filterMethod').addEventListener('change', render);
  document.getElementById('filterStatus').addEventListener('change', render);
  document.getElementById('filterTicket').addEventListener('change', render);
  document.getElementById('refreshBtn').addEventListener('click', render);

  // --- Export Excel (CSV format, ouvre dans Excel) ---
  document.getElementById('exportBtn').addEventListener('click', async () => {
    const data = await getReservations();
    if (!data.length) { alert('Aucune réservation à exporter'); return; }

    const headers = ['N° Résa', 'Date résa', 'Prénom', 'Nom', 'Email', 'Téléphone', 'Formule', 'Places', 'Prix unitaire', 'Total', 'Moyen paiement', 'Allergies / Message', 'Statut'];
    const rows = data.map(r => [
      r.bookingId,
      new Date(r.timestamp).toLocaleString('fr-FR'),
      r.prenom, r.nom, r.email, r.telephone,
      r.ticketName, r.qty,
      r.ticketPrice.toFixed(2).replace('.', ','),
      r.total.toFixed(2).replace('.', ','),
      r.paymentMethod || '',
      (r.message || '').replace(/[\r\n]+/g, ' '),
      r.status || ''
    ]);

    const escape = (v) => {
      const s = String(v ?? '');
      return /[;"\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
    };
    const csv = '﻿' + [headers, ...rows].map(r => r.map(escape).join(';')).join('\n');
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `brunch-ebene-reservations-${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
    URL.revokeObjectURL(url);
  });

  // --- Données démo ---
  document.getElementById('addDemo').addEventListener('click', () => {
    const demos = [
      {prenom:'Audrey', nom:'Konan', email:'audrey.k@gmail.com', telephone:'0612345678', ticketId:'duo', ticketName:'Duo', ticketPrice:35, qty:2, paymentMethod:'revolut', message:'', status:'confirmé'},
      {prenom:'Solange', nom:'Diabaté', email:'solange.d@example.fr', telephone:'0698765432', ticketId:'standard', ticketName:'Standard', ticketPrice:35, qty:1, paymentMethod:'wero', message:'Sans porc svp', status:'confirmé'},
      {prenom:'Débora', nom:'Mensah', email:'debora.m@yahoo.fr', telephone:'0654321098', ticketId:'trio', ticketName:'Trio', ticketPrice:35, qty:3, paymentMethod:'cb', message:'', status:'en attente vérification'},
      {prenom:'Kevin', nom:'Boateng', email:'kevin.b@outlook.com', telephone:'0687654321', ticketId:'standard', ticketName:'Standard', ticketPrice:35, qty:1, paymentMethod:'virement', message:'', status:'en attente vérification'},
      {prenom:'Joëlle', nom:'Aké', email:'joelle.a@gmail.com', telephone:'0612129090', ticketId:'duo', ticketName:'Duo', ticketPrice:35, qty:2, paymentMethod:'revolut', message:'Allergie arachide', status:'confirmé'},
      {prenom:'Rocky', nom:'Owusu', email:'rocky.o@gmail.com', telephone:'0623456789', ticketId:'trio', ticketName:'Trio', ticketPrice:35, qty:3, paymentMethod:'revolut', message:'', status:'confirmé'},
      {prenom:'Christelle', nom:'Yao', email:'chris.y@gmail.com', telephone:'0698123456', ticketId:'standard', ticketName:'Standard', ticketPrice:35, qty:1, paymentMethod:'wero', message:'', status:'confirmé'},
    ];
    const existing = JSON.parse(localStorage.getItem('reservations') || '[]');
    demos.forEach((d, i) => {
      existing.push({
        ...d,
        total: d.ticketPrice * d.qty,
        timestamp: new Date(Date.now() - i * 3600000).toISOString(),
        bookingId: 'EBN-' + (Date.now()-i*1000).toString(36).toUpperCase(),
        paidAt: new Date().toISOString()
      });
    });
    localStorage.setItem('reservations', JSON.stringify(existing));
    render();
  });
</script>
</body>
</html>
