<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0f0f17">
<title>Dashboard Admin · Réservations</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, system-ui, sans-serif;
    background: #0f0f17;
    color: #f5f5f7;
    min-height: 100vh;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  /* Login screen */
  .login-screen {
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
  }
  .login-card {
    background: #1a1a26;
    border: 1px solid #2a2a3a;
    border-radius: 20px;
    padding: 32px 24px;
    width: 100%;
    max-width: 380px;
    text-align: center;
  }
  .lock-icon {
    width: 60px; height: 60px;
    background: linear-gradient(135deg, #8b5cf6, #ec4899);
    border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 18px;
    color: white;
  }
  .login-card h1 { margin: 0 0 8px; font-size: 22px; font-weight: 800; }
  .login-card p { color: #a1a1b3; font-size: 14px; margin: 0 0 24px; }
  .login-card input {
    width: 100%;
    background: #0f0f17;
    border: 1.5px solid #2a2a3a;
    color: #f5f5f7;
    border-radius: 12px;
    padding: 14px;
    font-size: 16px;
    font-family: inherit;
    text-align: center;
    letter-spacing: 4px;
    margin-bottom: 12px;
  }
  .login-card input:focus { outline: none; border-color: #8b5cf6; }
  .login-card button {
    width: 100%;
    background: linear-gradient(135deg, #8b5cf6, #ec4899);
    color: white;
    border: none;
    border-radius: 12px;
    padding: 14px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
  }
  .login-hint { font-size: 12px; color: #6b6b80; margin-top: 14px; }
  .login-error { color: #f87171; font-size: 13px; margin-top: 8px; min-height: 16px; }

  /* Dashboard */
  .dashboard { display: none; max-width: 1200px; margin: 0 auto; padding: 20px; }
  .dashboard.show { display: block; }

  .header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 20px;
    flex-wrap: wrap;
    gap: 12px;
  }
  .header h1 { margin: 0; font-size: 24px; font-weight: 800; letter-spacing: -0.4px; }
  .header-actions { display: flex; gap: 8px; }
  .btn {
    padding: 10px 14px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    border: none;
    display: inline-flex; align-items: center; gap: 6px;
    text-decoration: none;
  }
  .btn-primary {
    background: linear-gradient(135deg, #8b5cf6, #ec4899);
    color: white;
  }
  .btn-secondary {
    background: #1a1a26;
    color: #f5f5f7;
    border: 1px solid #2a2a3a;
  }
  .btn-danger {
    background: transparent;
    color: #f87171;
    border: 1px solid #2a2a3a;
  }

  /* Stats */
  .stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
    margin-bottom: 20px;
  }
  .stat {
    background: #1a1a26;
    border: 1px solid #2a2a3a;
    border-radius: 16px;
    padding: 16px;
  }
  .stat-label { font-size: 12px; color: #a1a1b3; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
  .stat-value { font-size: 26px; font-weight: 800; margin-top: 6px; letter-spacing: -0.5px; }
  .stat-sub { font-size: 12px; color: #10b981; margin-top: 2px; font-weight: 600; }

  /* Filters */
  .filters {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }
  .filters input, .filters select {
    background: #1a1a26;
    border: 1px solid #2a2a3a;
    color: #f5f5f7;
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 14px;
    font-family: inherit;
  }
  .filters input { flex: 1; min-width: 200px; }
  .filters input:focus, .filters select:focus { outline: none; border-color: #8b5cf6; }

  /* Table */
  .table-wrap {
    background: #1a1a26;
    border: 1px solid #2a2a3a;
    border-radius: 16px;
    overflow: hidden;
  }
  .table-scroll { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; min-width: 720px; }
  th, td {
    padding: 12px 14px;
    text-align: left;
    font-size: 14px;
    border-bottom: 1px solid #2a2a3a;
  }
  th {
    background: #14141f;
    font-size: 12px;
    color: #a1a1b3;
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 700;
    position: sticky;
    top: 0;
  }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #14141f; }
  .badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 99px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .badge-paid { background: rgba(16, 185, 129, 0.15); color: #10b981; }
  .badge-pending { background: rgba(245, 158, 11, 0.15); color: #f59e0b; }

  .empty {
    padding: 60px 20px;
    text-align: center;
    color: #a1a1b3;
  }
  .empty svg { color: #4a4a5e; margin-bottom: 12px; }
  .empty h3 { margin: 0 0 6px; color: #f5f5f7; }

  .method-pill {
    display: inline-block;
    padding: 3px 8px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 700;
    background: #2a2a3a;
    color: #d1d1e0;
    text-transform: capitalize;
  }

  @media (max-width: 600px) {
    .header h1 { font-size: 20px; }
    .stat-value { font-size: 22px; }
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="login">
  <div class="login-card">
    <div class="lock-icon">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    </div>
    <h1>Espace privé</h1>
    <p>Entre le code admin pour accéder aux réservations</p>
    <input type="password" id="pwd" placeholder="••••••" autocomplete="off" inputmode="numeric">
    <button id="loginBtn">Se connecter</button>
    <div class="login-error" id="loginError"></div>
    <div class="login-hint">💡 Code démo : <code>1234</code></div>
  </div>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">
  <div class="header">
    <h1>📊 Tableau de bord</h1>
    <div class="header-actions">
      <button class="btn btn-secondary" id="addDemo">+ Ajouter données démo</button>
      <button class="btn btn-primary" id="exportBtn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Export Excel
      </button>
      <button class="btn btn-danger" id="logoutBtn">Déconnexion</button>
    </div>
  </div>

  <div class="stats" id="stats"></div>

  <div class="filters">
    <input type="text" id="search" placeholder="🔍 Rechercher par nom, email, ID...">
    <select id="filterMethod">
      <option value="">Tous les paiements</option>
      <option value="revolut">Revolut</option>
      <option value="wero">Wero</option>
      <option value="cb">CB</option>
      <option value="virement">Virement</option>
    </select>
    <select id="filterTicket">
      <option value="">Tous les billets</option>
      <option value="standard">Standard</option>
      <option value="vip">VIP</option>
      <option value="couple">Duo</option>
    </select>
  </div>

  <div class="table-wrap">
    <div class="table-scroll">
      <table id="resTable">
        <thead>
          <tr>
            <th>N° Résa</th>
            <th>Date</th>
            <th>Nom</th>
            <th>Email</th>
            <th>Téléphone</th>
            <th>Billet</th>
            <th>Qté</th>
            <th>Total</th>
            <th>Paiement</th>
            <th>Statut</th>
          </tr>
        </thead>
        <tbody id="resBody"></tbody>
      </table>
    </div>
    <div class="empty" id="empty" style="display:none;">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      <h3>Aucune réservation pour le moment</h3>
      <p>Les nouvelles réservations s'afficheront ici en temps réel.</p>
    </div>
  </div>
</div>

<script>
  // --- Auth (DEMO - en prod, à remplacer par une vraie auth) ---
  const ADMIN_PWD = '1234'; // ⚠️ change ça avant de publier !

  document.getElementById('loginBtn').addEventListener('click', tryLogin);
  document.getElementById('pwd').addEventListener('keydown', e => { if (e.key === 'Enter') tryLogin(); });

  function tryLogin() {
    const v = document.getElementById('pwd').value;
    if (v === ADMIN_PWD) {
      sessionStorage.setItem('admin_ok', '1');
      showDashboard();
    } else {
      document.getElementById('loginError').textContent = '❌ Code incorrect';
    }
  }

  if (sessionStorage.getItem('admin_ok')) showDashboard();

  function showDashboard() {
    document.getElementById('login').style.display = 'none';
    document.getElementById('dashboard').classList.add('show');
    render();
  }

  document.getElementById('logoutBtn').addEventListener('click', () => {
    sessionStorage.removeItem('admin_ok');
    location.reload();
  });

  // --- Data ---
  function getReservations() {
    return JSON.parse(localStorage.getItem('reservations') || '[]');
  }

  function render() {
    const all = getReservations();
    renderStats(all);
    renderTable(all);
  }

  function renderStats(data) {
    const total = data.length;
    const totalRevenue = data.reduce((s, r) => s + (r.total || 0), 0);
    const totalPlaces = data.reduce((s, r) => s + (r.qty || 0), 0);
    const today = new Date().toISOString().slice(0,10);
    const todayCount = data.filter(r => (r.timestamp || '').slice(0,10) === today).length;

    document.getElementById('stats').innerHTML = `
      <div class="stat">
        <div class="stat-label">Réservations</div>
        <div class="stat-value">${total}</div>
        <div class="stat-sub">+${todayCount} aujourd'hui</div>
      </div>
      <div class="stat">
        <div class="stat-label">Places vendues</div>
        <div class="stat-value">${totalPlaces}</div>
        <div class="stat-sub">${Math.max(0, 150 - totalPlaces)} restantes</div>
      </div>
      <div class="stat">
        <div class="stat-label">Recettes</div>
        <div class="stat-value">${totalRevenue.toFixed(2).replace('.', ',')} €</div>
        <div class="stat-sub">${total ? (totalRevenue/total).toFixed(2).replace('.', ',') : '0,00'} € / résa</div>
      </div>
      <div class="stat">
        <div class="stat-label">Taux remplissage</div>
        <div class="stat-value">${Math.round(totalPlaces/150*100)}%</div>
        <div class="stat-sub">Capacité 150</div>
      </div>
    `;
  }

  function renderTable(all) {
    const q = (document.getElementById('search').value || '').toLowerCase();
    const m = document.getElementById('filterMethod').value;
    const t = document.getElementById('filterTicket').value;

    const filtered = all.filter(r => {
      if (m && r.paymentMethod !== m) return false;
      if (t && r.ticketId !== t) return false;
      if (q) {
        const blob = `${r.prenom} ${r.nom} ${r.email} ${r.bookingId} ${r.telephone}`.toLowerCase();
        if (!blob.includes(q)) return false;
      }
      return true;
    });

    const body = document.getElementById('resBody');
    const empty = document.getElementById('empty');

    if (!filtered.length) {
      body.innerHTML = '';
      empty.style.display = all.length ? 'none' : 'block';
      if (all.length && !filtered.length) {
        body.innerHTML = `<tr><td colspan="10" style="text-align:center; color:#a1a1b3; padding: 30px;">Aucun résultat pour ces filtres</td></tr>`;
      }
      return;
    }
    empty.style.display = 'none';

    body.innerHTML = filtered.map(r => {
      const d = new Date(r.timestamp);
      const dateStr = d.toLocaleDateString('fr-FR') + ' ' + d.toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'});
      return `
        <tr>
          <td><code style="font-size:12px;">${r.bookingId}</code></td>
          <td>${dateStr}</td>
          <td><strong>${r.prenom} ${r.nom}</strong></td>
          <td>${r.email}</td>
          <td>${r.telephone}</td>
          <td>${r.ticketName}</td>
          <td>${r.qty}</td>
          <td><strong>${r.total.toFixed(2).replace('.', ',')} €</strong></td>
          <td><span class="method-pill">${r.paymentMethod || '—'}</span></td>
          <td><span class="badge badge-paid">✓ Payé</span></td>
        </tr>
      `;
    }).join('');
  }

  document.getElementById('search').addEventListener('input', render);
  document.getElementById('filterMethod').addEventListener('change', render);
  document.getElementById('filterTicket').addEventListener('change', render);

  // --- Export Excel (CSV format, ouvre dans Excel) ---
  document.getElementById('exportBtn').addEventListener('click', () => {
    const data = getReservations();
    if (!data.length) { alert('Aucune réservation à exporter'); return; }

    const headers = ['N° Résa', 'Date résa', 'Prénom', 'Nom', 'Email', 'Téléphone', 'Type billet', 'Quantité', 'Prix unitaire', 'Total', 'Moyen paiement', 'Message', 'Statut'];
    const rows = data.map(r => [
      r.bookingId,
      new Date(r.timestamp).toLocaleString('fr-FR'),
      r.prenom, r.nom, r.email, r.telephone,
      r.ticketName, r.qty,
      r.ticketPrice.toFixed(2).replace('.', ','),
      r.total.toFixed(2).replace('.', ','),
      r.paymentMethod || '',
      (r.message || '').replace(/[\r\n]+/g, ' '),
      'Payé'
    ]);

    const escape = (v) => {
      const s = String(v ?? '');
      return /[;"\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
    };
    const csv = '﻿' + [headers, ...rows].map(r => r.map(escape).join(';')).join('\n');
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `reservations-${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
    URL.revokeObjectURL(url);
  });

  // --- Données démo ---
  document.getElementById('addDemo').addEventListener('click', () => {
    const demos = [
      {prenom:'Léa', nom:'Martin', email:'lea.martin@gmail.com', telephone:'0612345678', ticketId:'vip', ticketName:'VIP', ticketPrice:45, qty:2, paymentMethod:'revolut', message:''},
      {prenom:'Thomas', nom:'Dubois', email:'tom@example.fr', telephone:'0698765432', ticketId:'standard', ticketName:'Standard', ticketPrice:25, qty:1, paymentMethod:'wero', message:'Sans alcool svp'},
      {prenom:'Sarah', nom:'Bernard', email:'sarah.b@yahoo.fr', telephone:'0654321098', ticketId:'couple', ticketName:'Duo', ticketPrice:40, qty:1, paymentMethod:'cb', message:''},
      {prenom:'Karim', nom:'El Amrani', email:'karim.ea@outlook.com', telephone:'0687654321', ticketId:'vip', ticketName:'VIP', ticketPrice:45, qty:4, paymentMethod:'virement', message:'Anniversaire 🎂'},
      {prenom:'Chloé', nom:'Petit', email:'chloe.p@gmail.com', telephone:'0612129090', ticketId:'standard', ticketName:'Standard', ticketPrice:25, qty:3, paymentMethod:'revolut', message:''},
    ];
    const existing = getReservations();
    demos.forEach((d, i) => {
      existing.push({
        ...d,
        total: d.ticketPrice * d.qty,
        timestamp: new Date(Date.now() - i * 3600000).toISOString(),
        bookingId: 'RSV-' + (Date.now()-i*1000).toString(36).toUpperCase(),
        status: 'confirmé',
        paidAt: new Date().toISOString()
      });
    });
    localStorage.setItem('reservations', JSON.stringify(existing));
    render();
  });
</script>
</body>
</html>
