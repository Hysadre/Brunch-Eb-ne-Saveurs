<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f0a06">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="shortcut icon" href="favicon.ico">
<title>Mon billet · Brunch Ébène &amp; Saveurs</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, system-ui, sans-serif;
    background: #0f0a06;
    color: #ede5d1;
    min-height: 100vh;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  .app { max-width: 560px; margin: 0 auto; padding: 24px 20px 40px; }

  .status-hero {
    text-align: center;
    padding: 32px 20px;
    border-radius: 24px;
    position: relative;
    overflow: hidden;
  }
  .status-hero.paid { background: linear-gradient(135deg, #16a34a, #22c55e); color: white; }
  .status-hero.pending { background: linear-gradient(135deg, #b86a45, #c79270); color: #1a1108; }
  .status-hero.error { background: linear-gradient(135deg, #b91c1c, #ef4444); color: white; }
  .status-icon {
    width: 70px; height: 70px;
    background: white;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 14px;
    font-size: 36px;
    animation: pop .5s cubic-bezier(.34,1.56,.64,1);
  }
  .status-hero.paid .status-icon { color: #16a34a; }
  .status-hero.pending .status-icon { color: #b86a45; }
  .status-hero.error .status-icon { color: #b91c1c; }
  @keyframes pop {
    0% { transform: scale(0); opacity: 0; }
    60% { transform: scale(1.15); }
    100% { transform: scale(1); opacity: 1; }
  }
  .status-title { font-size: 24px; font-weight: 800; margin: 0 0 6px; letter-spacing: -0.5px; }
  .status-sub { font-size: 14px; opacity: .95; margin: 0; }

  .ticket-card {
    background: #1a1108;
    border: 1px solid #3a2818;
    border-radius: 20px;
    margin-top: 18px;
    overflow: hidden;
  }
  .ticket-top {
    padding: 22px;
    background: linear-gradient(135deg, #1a1108, #2a1810);
  }
  .ticket-eyebrow { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: #c79270; font-weight: 700; }
  .ticket-name { font-size: 22px; font-weight: 800; margin: 6px 0 16px; letter-spacing: -0.3px; color: #fff; }
  .ticket-name .accent {
    background: linear-gradient(135deg, #b86a45, #c79270);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    font-style: italic;
  }
  .ticket-meta { display: flex; gap: 18px; flex-wrap: wrap; }
  .ticket-meta .lab { font-size: 11px; color: #d4a574; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
  .ticket-meta .val { font-size: 15px; font-weight: 700; margin-top: 2px; color: #fff; }
  .ticket-stub {
    position: relative;
    padding: 22px;
    border-top: 2px dashed #3a2818;
  }
  .ticket-stub::before, .ticket-stub::after {
    content: ""; position: absolute; top: -14px;
    width: 28px; height: 28px;
    background: #0f0a06; border-radius: 50%;
  }
  .ticket-stub::before { left: -14px; }
  .ticket-stub::after { right: -14px; }
  .qr-wrap {
    background: white; padding: 16px;
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
  }
  .qr-wrap img { width: 100%; max-width: 220px; height: auto; }
  .qr-caption {
    text-align: center; color: #d4a574;
    font-size: 13px; margin-top: 12px;
    font-weight: 600;
  }

  .info-card {
    background: #1a1108;
    border: 1px solid #3a2818;
    border-radius: 20px;
    padding: 20px;
    margin-top: 14px;
  }
  .info-card h3 { margin: 0 0 12px; font-size: 16px; font-weight: 700; color: #fff; }
  .info-row {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 0;
    font-size: 14px;
    color: #ede5d1;
  }
  .info-row svg { color: #b86a45; flex: 0 0 18px; }
  .info-row .v { font-weight: 600; color: #c79270; }

  .booking-ref-box {
    margin-top: 14px;
    padding: 16px;
    background: linear-gradient(135deg, #b86a45, #c79270);
    border-radius: 16px;
    text-align: center;
    color: #1a1108;
  }
  .booking-ref-label { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
  .booking-ref-code {
    font-family: monospace;
    font-size: 22px;
    font-weight: 800;
    margin-top: 6px;
    letter-spacing: 1px;
    word-break: break-all;
  }

  .loading, .error-state {
    text-align: center;
    padding: 60px 20px;
    color: #d4a574;
  }
  .spinner {
    width: 40px; height: 40px;
    border: 4px solid #3a2818;
    border-top-color: #b86a45;
    border-radius: 50%;
    margin: 0 auto 16px;
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .contact-footer {
    margin-top: 32px;
    padding: 18px 0 24px;
    border-top: 1px solid #3a2818;
    text-align: center;
  }
  .contact-footer-title {
    font-size: 11px;
    color: #8a6648;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 10px;
    font-weight: 700;
  }
  .contact-footer-row { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
  .contact-pill {
    display: inline-flex; align-items: center; gap: 6px;
    background: #1a1108;
    border: 1px solid #3a2818;
    color: #c79270;
    padding: 8px 14px;
    border-radius: 99px;
    text-decoration: none;
    font-size: 13px;
    font-weight: 700;
  }
  .contact-pill.whatsapp { background: rgba(22, 163, 74, 0.1); color: #22c55e; border-color: rgba(22, 163, 74, 0.3); }
</style>
</head>
<body>
<div class="app">
  <div id="loading" class="loading">
    <div class="spinner"></div>
    <p>Recherche de ta réservation...</p>
  </div>

  <div id="content" style="display:none;"></div>

  <div class="contact-footer">
    <div class="contact-footer-title">📞 Une question ?</div>
    <div class="contact-footer-row">
      <a href="https://wa.me/33668295077" class="contact-pill whatsapp">💬 WhatsApp +33 6 68 29 50 77</a>
      <a href="tel:+33668295077" class="contact-pill">📞 Appeler</a>
    </div>
  </div>
</div>

<script>
  const API_URL = 'https://brunch-eb-ne-saveurs.onrender.com/api';

  // Récupère l'ID de réservation depuis l'URL
  const params = new URLSearchParams(window.location.search);
  const bookingId = params.get('id');

  if (!bookingId) {
    renderError("Aucun numéro de réservation fourni dans le lien.");
  } else {
    loadBooking(bookingId);
  }

  async function loadBooking(id) {
    try {
      const r = await fetch(`${API_URL}/verify/${encodeURIComponent(id)}`);
      if (!r.ok) {
        if (r.status === 404) return renderError(`Aucune réservation trouvée pour <strong>${id}</strong>.`);
        throw new Error('HTTP ' + r.status);
      }
      const data = await r.json();
      renderBooking(data);
    } catch(e) {
      console.error(e);
      renderError("Impossible de charger la réservation. Réessaie dans un instant.");
    }
  }

  function renderBooking(b) {
    document.getElementById('loading').style.display = 'none';
    const content = document.getElementById('content');
    content.style.display = 'block';

    const isPaid = b.status === 'confirmé';
    const statusClass = isPaid ? 'paid' : 'pending';
    const statusIcon = isPaid ? '✓' : '⏳';
    const statusTitle = isPaid ? 'Réservation confirmée' : 'Paiement en attente';
    const statusSub = isPaid
      ? `Vous êtes bien sur la liste pour le brunch, ${b.prenom} 🎉`
      : `Votre paiement est en cours de vérification. Nous validons cela dès que possible.`;

    content.innerHTML = `
      <div class="status-hero ${statusClass}">
        <div class="status-icon">${statusIcon}</div>
        <h1 class="status-title">${statusTitle}</h1>
        <p class="status-sub">${statusSub}</p>
      </div>

      <div class="ticket-card">
        <div class="ticket-top">
          <div class="ticket-eyebrow">🌴 Billet électronique</div>
          <div class="ticket-name">Brunch <span class="accent">Ébène &amp; Saveurs</span></div>
          <div class="ticket-meta">
            <div class="item">
              <div class="lab">Au nom de</div>
              <div class="val">${b.prenom} ${b.nom}</div>
            </div>
            <div class="item">
              <div class="lab">Formule</div>
              <div class="val">${b.ticketName}</div>
            </div>
            <div class="item">
              <div class="lab">Places</div>
              <div class="val">${b.qty}</div>
            </div>
          </div>
        </div>
        ${isPaid ? `
        <div class="ticket-stub">
          <div class="qr-wrap">
            <img src="https://api.qrserver.com/v1/create-qr-code/?data=${encodeURIComponent(window.location.href)}&size=400x400&margin=10" alt="QR code de réservation">
          </div>
          <div class="qr-caption">📸 À présenter à l'entrée pour scan</div>
        </div>
        ` : `
        <div class="ticket-stub" style="text-align: center;">
          <div style="background: rgba(251, 191, 36, 0.10); border: 1px dashed rgba(251, 191, 36, 0.4); border-radius: 14px; padding: 24px;">
            <div style="font-size: 36px; margin-bottom: 8px;">⏳</div>
            <p style="margin: 0 0 6px; font-weight: 700; color: #c79270;">QR code en attente</p>
            <p style="margin: 0; font-size: 13px; color: #d4a574; line-height: 1.5;">
              Votre QR code unique s'affichera ici dès que votre <strong>paiement aura été vérifié</strong>. Vous recevrez également un email de confirmation.
            </p>
          </div>
        </div>
        `}
      </div>

      <div class="info-card">
        <h3>📍 Informations pratiques</h3>
        <div class="info-row">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          <span class="v">Samedi 22 août 2026 · 12h00</span>
        </div>
        <div class="info-row">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
          <span>Salle de Ronchin, 59790 Ronchin (Lille)</span>
        </div>
        <div class="info-row" style="padding-top:0;">
          <span style="width:18px;"></span>
          <a href="https://www.google.com/maps/search/?api=1&query=Salle+de+Ronchin+59790+Ronchin" target="_blank" rel="noopener" style="background: linear-gradient(135deg, #06b6d4, #0891b2); color: white; text-decoration: none; padding: 8px 16px; border-radius: 99px; font-weight: 700; font-size: 13px; display: inline-flex; align-items: center; gap: 6px;">🗺️ Voir l'itinéraire</a>
        </div>
        <div class="info-row">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 9h6v6H9z"/></svg>
          <span>Présentez ce numéro à l'entrée pour récupérer votre bracelet</span>
        </div>
      </div>

      <!-- 📤 Bouton partager -->
      <div style="margin-top: 14px;">
        <button id="shareBtn" style="width:100%; background: linear-gradient(135deg, #16a34a, #22c55e); color: white; border: none; padding: 14px; border-radius: 14px; font-weight: 700; font-size: 15px; cursor: pointer; font-family: inherit; display: flex; align-items: center; justify-content: center; gap: 8px;">
          📤 Inviter des amis au brunch
        </button>
      </div>

      <div class="booking-ref-box">
        <div class="booking-ref-label">N° de réservation</div>
        <div class="booking-ref-code">${b.bookingId}</div>
      </div>
    `;

    // 📤 Bouton partager
    setTimeout(() => {
      const shareBtn = document.getElementById('shareBtn');
      if (shareBtn) {
        shareBtn.addEventListener('click', async () => {
          const shareData = {
            title: 'Brunch Ébène & Saveurs',
            text: `Bonjour, je viens au Brunch Ébène & Saveurs le 22 août 2026 à Ronchin 🌴 Voulez-vous nous rejoindre ?`,
            url: 'https://hysadre.github.io/Brunch-Eb-ne-Saveurs/'
          };
          try {
            if (navigator.share) {
              await navigator.share(shareData);
            } else {
              await navigator.clipboard.writeText(`${shareData.text}\n\n${shareData.url}`);
              alert('✓ Lien copié ! Tu peux le coller dans WhatsApp, Insta, etc.');
            }
          } catch(e) { if (e.name !== 'AbortError') console.error(e); }
        });
      }
    }, 100);
  }

  function renderError(msg) {
    document.getElementById('loading').style.display = 'none';
    const content = document.getElementById('content');
    content.style.display = 'block';
    content.innerHTML = `
      <div class="status-hero error">
        <div class="status-icon">✕</div>
        <h1 class="status-title">Réservation introuvable</h1>
        <p class="status-sub">${msg}</p>
      </div>
      <div class="info-card" style="margin-top: 20px;">
        <p style="margin:0; color: #d4a574; font-size: 14px; line-height: 1.6;">
          Si vous pensez qu'il y a une erreur, contactez-nous via WhatsApp en bas avec votre numéro de réservation.
        </p>
      </div>
    `;
  }
</script>
</body>
</html>
