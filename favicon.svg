<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Background rounded square — couleur du site -->
  <rect width="100" height="100" fill="#0f0a06" rx="20"/>

  <!-- Feuille de bananier (style logo) -->
  <g transform="translate(8, 12)">
    <!-- Corps de la feuille -->
    <path d="M 18 0
             Q -2 25, 8 65
             Q 22 50, 32 70
             Q 42 45, 50 18
             Q 35 5, 18 0 Z"
          fill="#16a34a"/>
    <!-- Highlight clair sur la feuille -->
    <path d="M 18 0
             Q 12 20, 20 55
             Q 28 40, 35 50
             Q 40 30, 42 12
             Q 30 4, 18 0 Z"
          fill="#22c55e" opacity="0.5"/>
    <!-- Nervure centrale dorée -->
    <path d="M 22 4 Q 27 25, 30 70"
          stroke="#fbbf24" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- Petites nervures -->
    <path d="M 25 18 L 14 22 M 27 32 L 13 40 M 28 48 L 17 56"
          stroke="#fbbf24" stroke-width="0.8" fill="none" opacity="0.7"/>
  </g>

  <!-- Lettre É en italique orange (clin d'œil au "Brunch" du logo) -->
  <text x="68" y="78"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="56"
        font-weight="bold"
        font-style="italic"
        fill="#f97316"
        text-anchor="middle">É</text>
</svg>
